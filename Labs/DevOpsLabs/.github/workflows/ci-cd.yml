name: CI Build & Test + SonarCloud (DevOpsLabs)

on:
  pull_request:
    branches: [ main, master ]
    paths:
      - 'Labs/DevOpsLabs/**'          # запускається при будь-яких змінах у DevOpsLabs
  push:
    branches: [ main, master ]
    paths:
      - 'Labs/DevOpsLabs/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # Всі команди виконуються всередині DevOpsLabs
    defaults:
      run:
        working-directory: Labs/DevOpsLabs

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and Test with Maven
        # Запускаємо мvnw з папки Lab-1 (бо там pom.xml і wrapper)
        run: Lab-1/./mvnw clean verify --batch-mode --no-transfer-progress

      - name: SonarCloud Analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        # Sonar запускаємо теж з Lab-1
        run: |
          Lab-1/./mvnw sonar:sonar \
            -Dsonar.projectKey=c0ldarm_dev0ps \
            -Dsonar.organization=c0ldarm \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.login=${{ secrets.SONAR_TOKEN }}