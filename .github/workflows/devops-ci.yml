name: Lab-2 CI + SonarCloud

on:
  pull_request:
    branches: [ main, master ]
    paths:
      - 'Labs/DevOpsLabs/Lab-2/**'
  push:
    branches: [ main, master ]
    paths:
      - 'Labs/DevOpsLabs/Lab-2/**'

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Labs/DevOpsLabs/Lab-2

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and Test
        run: ./mvnw clean verify --batch-mode --no-transfer-progress

  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: build-and-test
    if: success()

    defaults:
      run:
        working-directory: Labs/DevOpsLabs/Lab-2

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      # ←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←
      - name: Compile (for Sonar)
        run: ./mvnw compile --batch-mode --no-transfer-progress

      - name: SonarCloud Analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          ./mvnw sonar:sonar \
            -Dsonar.projectKey=c0ldarm_dev0ps \
            -Dsonar.organization=c0ldarm \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.login=${{ secrets.SONAR_TOKEN }} \
            --batch-mode --no-transfer-progress
            -Dsonar.qualitygate.wait=false 
            -Dsonar.coverage.exclusions=**/* \ 