name: CI Build & Test + SonarCloud (Lab-1)

on:
  pull_request:
    branches: [ main, master ]
    paths:
      - 'Labs/DevOpsLabs/Lab-1/**'
  push:
    branches: [ main, master ]
    paths:
      - 'Labs/DevOpsLabs/Lab-1/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # Важливо: всі команди виконуються всередині папки Lab-1
    defaults:
      run:
        working-directory: Labs/DevOpsLabs/Lab-1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and Test with Maven
        run: ./mvnw clean verify --batch-mode --no-transfer-progress

      - name: SonarCloud Analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          ./mvnw sonar:sonar \
            -Dsonar.projectKey=c0ldarm_dev0ps \
            -Dsonar.organization=c0ldarm \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.login=${{ secrets.SONAR_TOKEN }}