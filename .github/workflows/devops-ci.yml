name: Lab-2 CI + SonarCloud

on:
  pull_request:
    branches: [ main, master ]
    paths:
      - 'Labs/DevOpsLabs/Lab-2/**'
  push:
    branches: [ main, master ]
    paths:
      - 'Labs/DevOpsLabs/Lab-2/**'

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Labs/DevOpsLabs/Lab-2

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and Test with Testcontainers
        run: ./mvnw clean test --batch-mode --no-transfer-progress

      - name: SonarCloud Analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          ./mvnw sonar:sonar \
            -Dsonar.projectKey=c0ldarm_dev0ps \
            -Dsonar.organization=c0ldarm \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.login=${{ secrets.SONAR_TOKEN }}