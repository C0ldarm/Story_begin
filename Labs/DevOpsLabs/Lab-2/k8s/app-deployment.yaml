apiVersion: apps/v1
kind: Deployment
metadata:
  name: aitest-app
spec:
  replicas: 4
  selector:
    matchLabels:
      app: aitest
  template:
    metadata:
      labels:
        app: aitest
    spec:
      containers:
      - name: aitest
        image: aitest:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
        env:
        - name: SPRING_DATA_MONGODB_HOST
          value: "mongo"
        - name: SPRING_DATA_MONGODB_PORT
          value: "27017"
        - name: SPRING_DATA_MONGODB_DATABASE
          value: "security25db"
        - name: SPRING_DATA_MONGODB_USERNAME
          value: "admin"
        - name: SPRING_DATA_MONGODB_PASSWORD
          value: "adminpass"
        - name: SPRING_DATA_MONGODB_AUTHENTICATION_DATABASE
          value: "admin"