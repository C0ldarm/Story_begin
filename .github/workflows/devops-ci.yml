name: DevOpsLabs CI + SonarCloud

on:
  pull_request:
    branches: [ main, master ]
    paths:
      - 'Labs/DevOpsLabs/**'        # реагує тільки на зміни в DevOpsLabs
  push:
    branches: [ main, master ]
    paths:
      - 'Labs/DevOpsLabs/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Labs/DevOpsLabs   # всі команди виконуються тут

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and Test (Lab-1)
        run: Lab-1/./mvnw clean verify --batch-mode --no-transfer-progress

      - name: SonarCloud Analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          Lab-1/./mvnw sonar:sonar \
            -Dsonar.projectKey=c0ldarm_dev0ps \
            -Dsonar.organization=c0ldarm \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.login=${{ secrets.SONAR_TOKEN }}
