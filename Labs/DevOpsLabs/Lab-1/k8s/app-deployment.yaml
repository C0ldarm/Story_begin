apiVersion: apps/v1
kind: Deployment
metadata:
  name: aitest-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aitest
  template:
    metadata:
      labels:
        app: aitest
    spec:
      containers:
      - name: aitest
        image: aitest:latest
        ports:
        - containerPort: 8080
        env:
        - name: SPRING_DATA_MONGODB_URI
          value: mongodb://mongo:27017/security25db
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 10
